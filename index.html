<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de Itens - NEXUS</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* HEADER NEXUS */
        .header-nexus {
            display: flex;
            align-items: stretch;
            background: #e6e6e6;
            border: 3px solid #000;
            margin-bottom: 30px;
        }

        .nexus-box {
            background: linear-gradient(180deg, #8b1a1a 0%, #5a0f0f 100%);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 3px solid #000;
            min-width: 200px;
        }

        .nexus-logo {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .nexus-logo .x {
            color: #ff0000;
            font-size: 48px;
        }

        .titulo-principal {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-style: italic;
            font-weight: bold;
            color: #000;
            padding: 20px;
        }

        .nexus-box-right {
            background: linear-gradient(180deg, #8b1a1a 0%, #5a0f0f 100%);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 3px solid #000;
            min-width: 200px;
        }

        /* TABS */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            background: #2a2a2a;
            color: #fff;
            border: 2px solid #444;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .tab-button.active {
            background: linear-gradient(135deg, #ff3b3b 0%, #c41f1f 100%);
            border-color: #ff3b3b;
        }

        .tab-button:hover:not(.active) {
            background: #333;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* FORMULÁRIO */
        .form-box {
            background: #2a2a2a;
            padding: 30px;
            border: 3px solid #444;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .form-box h3 {
            color: #ff3b3b;
            margin-bottom: 20px;
            font-size: 20px;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #d4a8a8;
            text-transform: uppercase;
            font-size: 13px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            color: #fff;
            border: 2px solid #444;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 20px;
            font-family: 'Arial', sans-serif;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        select {
            cursor: pointer;
        }

        input::placeholder, textarea::placeholder {
            color: #666;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ff3b3b;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .col-full {
            grid-column: 1 / -1;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff3b3b 0%, #c41f1f 100%);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 59, 59, 0.4);
        }

        button:hover {
            background: linear-gradient(135deg, #e63030 0%, #a81818 100%);
            box-shadow: 0 6px 20px rgba(255, 59, 59, 0.6);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* CONSULTA SPAWN */
        .spawn-result-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 6px;
            border: 2px solid #444;
            margin-top: 20px;
            display: none;
        }

        .spawn-result-box.show {
            display: block;
        }

        .spawn-result-item {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #4ade80;
        }

        .spawn-result-nome {
            color: #4ade80;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .spawn-result-categoria {
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .spawn-result-comando {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .spawn-result-comando:hover {
            background: #333;
            transform: translateX(3px);
        }

        .btn-copiar-spawn {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-copiar-spawn:hover {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            transform: translateY(-2px);
        }

        /* LISTA DE ITENS */
        .itens-adicionados {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 6px;
            border: 2px solid #444;
            margin-bottom: 20px;
            min-height: 80px;
        }

        .itens-adicionados h4 {
            color: #ff3b3b;
            margin-bottom: 15px;
            font-size: 16px;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
        }

        .item-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            padding: 10px 15px;
            border-radius: 8px;
            margin: 5px;
            border-left: 4px solid #ff3b3b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .item-tag:hover {
            transform: translateX(3px);
            box-shadow: 0 4px 12px rgba(255,59,59,0.3);
        }

        .item-tag-nome {
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
        }

        .item-tag-qtd {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: #000;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
        }

        .item-tag-remove {
            background: linear-gradient(135deg, #ff3b3b 0%, #c41f1f 100%);
            color: #fff;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            transition: all 0.3s;
            min-width: 28px;
            max-width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-tag-remove:hover {
            background: linear-gradient(135deg, #e63030 0%, #a81818 100%);
            transform: scale(1.1);
        }

        .empty-itens {
            color: #666;
            font-style: italic;
            text-align: center;
        }

        /* RESULTADO */
        .result-box {
            background: #e6e6e6;
            border: 3px solid #000;
            padding: 0;
            border-radius: 8px;
            overflow: hidden;
            display: none;
            margin-bottom: 30px;
        }

        .result-box.show {
            display: block;
        }

        .result-header {
            background: #000;
            color: #fff;
            padding: 15px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
        }

        .result-content {
            padding: 30px;
            color: #000;
        }

        .solicitacao-texto {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 6px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 15px;
        }

        .comandos-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 6px;
            margin-top: 15px;
        }

        .comando-item {
            color: #4ade80;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 4px;
            border-left: 4px solid #4ade80;
            cursor: pointer;
            transition: all 0.3s;
        }

        .comando-item:hover {
            background: #333;
            transform: translateX(3px);
        }

        .btn-copy {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            margin-bottom: 10px;
        }

        .btn-copy:hover {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        /* HISTÓRICO */
        .historico-box {
            background: #2a2a2a;
            padding: 25px;
            border: 3px solid #444;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
        }

        .historico-box h3 {
            color: #ff3b3b;
            margin-bottom: 15px;
            font-size: 18px;
            text-align: center;
        }

        .historico-item {
            background: #1a1a1a;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #ff3b3b;
        }

        .historico-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }

        .historico-item-id {
            font-weight: 700;
            color: #ff3b3b;
            font-size: 14px;
        }

        .historico-item-data {
            font-size: 10px;
            color: #888;
        }

        .historico-item-motivo {
            color: #fff;
            margin-bottom: 8px;
            font-size: 12px;
            padding: 6px 8px;
            background: #0a0a0a;
            border-radius: 4px;
        }

        .historico-item-itens {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            padding: 8px;
            background: #0a0a0a;
            border-radius: 4px;
        }

        .historico-item-tag {
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            border: 1px solid #ff3b3b;
            color: #fff;
            font-weight: 600;
        }

        .btn-carregar-historico {
            background: linear-gradient(135deg, #ff3b3b 0%, #c41f1f 100%);
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-carregar-historico:hover {
            background: linear-gradient(135deg, #e63030 0%, #a81818 100%);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .header-nexus {
                flex-direction: column;
            }

            .nexus-box, .nexus-box-right {
                border-right: none;
                border-left: none;
                border-bottom: 3px solid #000;
                min-width: 100%;
            }

            .nexus-box-right {
                border-bottom: none;
                border-top: 3px solid #000;
            }

            .titulo-principal {
                font-size: 24px;
            }

            .row {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .tabs-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header-nexus">
        <div class="nexus-box">
            <div class="nexus-logo">NE<span class="x">X</span>US</div>
        </div>
        <div class="titulo-principal">
            Spawn/Devs de Itens
        </div>
        <div class="nexus-box-right">
            <div class="nexus-logo">NE<span class="x">X</span>US</div>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs-container">
        <button class="tab-button active" onclick="trocarAba('solicitacao')">📝 Criar Solicitação</button>
        <button class="tab-button" onclick="trocarAba('consulta')">🔍 Consultar Spawns</button>
    </div>

    <!-- ABA: CRIAR SOLICITAÇÃO -->
    <div id="tab-solicitacao" class="tab-content active">
        <!-- FORMULÁRIO -->
        <div class="form-box">
            <h3>📝 Criar Solicitação de Devolução</h3>
            
            <label>ID do Player:</label>
            <input type="text" id="inputPlayerId" placeholder="Digite o ID do player">

            <label>Motivo da Solicitação:</label>
            <textarea id="inputMotivo" placeholder="Ex: Perdeu itens por bug, ganhou ação marcada, etc."></textarea>

            <label>Categoria do Item:</label>
            <select id="selectCategoria" onchange="carregarItens()">
                <option value="">-- Selecione uma categoria --</option>
                <option value="todos">📦 TODOS OS ITENS</option>
                <option value="armas_brancas">Armas Brancas</option>
                <option value="armas_policia">Armas da Polícia</option>
                <option value="armas_bandidos">Armas dos Bandidos</option>
                <option value="armas_extras">Armas Extras</option>
                <option value="lojinha">Itens da Lojinha</option>
                <option value="fabricacao">Itens de Fabricação</option>
                <option value="drogas">Itens de Drogas</option>
                <option value="diversos">Itens Diversos</option>
                <option value="municoes">Munições</option>
            </select>

            <div class="row">
                <div>
                    <label>🔍 Pesquisar Item:</label>
                    <input type="text" id="inputPesquisa" placeholder="Digite para buscar em todas as categorias...">
                </div>
                <div>
                    <label>Item:</label>
                    <select id="selectItem">
                        <option value="">-- Selecione um item --</option>
                    </select>
                </div>
            </div>

            <div class="row" style="align-items: end;">
                <div></div>
                <div>
                    <label>Quantidade:</label>
                    <input type="number" id="inputQuantidade" placeholder="1" min="1" value="1">
                </div>
            </div>

            <button onclick="adicionarItem()">➕ Adicionar Item</button>
        </div>

        <!-- ITENS ADICIONADOS -->
        <div class="form-box" style="padding: 20px;">
            <div class="itens-adicionados" id="itensAdicionados">
                <h4>📦 Itens Adicionados</h4>
                <div class="empty-itens" id="emptyItens">Nenhum item adicionado ainda</div>
                <div id="listaItens"></div>
            </div>

            <button onclick="gerarSolicitacao()" id="btnGerar" disabled>🎯 Gerar Solicitação</button>
        </div>

        <!-- RESULTADO -->
        <div class="result-box" id="resultBox">
            <div class="result-header">📋 SOLICITAÇÃO GERADA</div>
            <div class="result-content">
                <div class="solicitacao-texto" id="solicitacaoTexto"></div>
                <button class="btn-copy" onclick="copiarSolicitacao()">📋 Copiar Solicitação Completa</button>

                <div class="comandos-box">
                    <h4 style="color: #4ade80; margin-bottom: 15px; text-align: center;">⚡ COMANDOS INDIVIDUAIS</h4>
                    <div id="comandosLista"></div>
                </div>
                <button class="btn-copy" onclick="copiarTodosComandos()">📋 Copiar Todos os Comandos</button>

                <div class="button-group">
                    <button onclick="novaSolicitacao()">🔄 Nova Solicitação</button>
                    <button onclick="editarSolicitacao()">✏️ Editar</button>
                </div>
            </div>
        </div>

        <!-- HISTÓRICO -->
        <div class="historico-box">
            <h3>📊 Histórico de Solicitações</h3>
            <div id="historicoLista">
                <div class="empty-itens">Nenhuma solicitação realizada ainda</div>
            </div>
            <button onclick="limparHistorico()" style="margin-top: 15px;">🗑️ Limpar Histórico</button>
        </div>
    </div>

    <!-- ABA: CONSULTAR SPAWNS -->
    <div id="tab-consulta" class="tab-content">
        <div class="form-box">
            <h3>🔍 Consultar Spawn de Itens</h3>
            
            <label>Pesquisar Item:</label>
            <input type="text" id="inputConsultaSpawn" placeholder="Digite o nome do item para consultar seu spawn..." oninput="consultarSpawn()">

            <label>Ou selecione por categoria:</label>
            <select id="selectConsultaCategoria" onchange="consultarPorCategoria()">
                <option value="">-- Selecione uma categoria --</option>
                <option value="todos">📦 TODOS OS ITENS</option>
                <option value="armas_brancas">Armas Brancas</option>
                <option value="armas_policia">Armas da Polícia</option>
                <option value="armas_bandidos">Armas dos Bandidos</option>
                <option value="armas_extras">Armas Extras</option>
                <option value="lojinha">Itens da Lojinha</option>
                <option value="fabricacao">Itens de Fabricação</option>
                <option value="drogas">Itens de Drogas</option>
                <option value="diversos">Itens Diversos</option>
                <option value="municoes">Munições</option>
            </select>

            <div class="spawn-result-box" id="spawnResultBox">
                <div id="spawnResultContent"></div>
            </div>
        </div>
    </div>
</div>

<script>

let itensAdicionados = [];
let historico = [];
let todosItens = [];

// Criar lista de todos os itens ao carregar
function criarListaTodosItens() {
    todosItens = [];
    for (let categoria in categorias) {
        categorias[categoria].forEach((item, index) => {
            todosItens.push({
                nome: item.nome,
                spawn: item.spawn,
                categoria: categoria,
                index: index
            });
        });
    }
}

// ============= FUNÇÕES DAS ABAS =============
function trocarAba(aba) {
    // Remover classe active de todos os botões e conteúdos
    document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    // Adicionar classe active na aba selecionada
    if (aba === 'solicitacao') {
        document.querySelector('.tab-button:nth-child(1)').classList.add('active');
        document.getElementById('tab-solicitacao').classList.add('active');
    } else if (aba === 'consulta') {
        document.querySelector('.tab-button:nth-child(2)').classList.add('active');
        document.getElementById('tab-consulta').classList.add('active');
    }
}

// ============= FUNÇÕES DE CONSULTA DE SPAWN =============
function consultarSpawn() {
    const termo = document.getElementById('inputConsultaSpawn').value.trim().toLowerCase();
    const resultBox = document.getElementById('spawnResultBox');
    const resultContent = document.getElementById('spawnResultContent');
    
    // Limpar seleção de categoria ao pesquisar
    document.getElementById('selectConsultaCategoria').value = '';
    
    if (termo.length < 2) {
        resultBox.classList.remove('show');
        return;
    }
    
    // Filtrar itens que contenham o termo de busca
    const itensFiltrados = todosItens.filter(item => 
        item.nome.toLowerCase().includes(termo)
    );
    
    if (itensFiltrados.length === 0) {
        resultContent.innerHTML = '<div class="empty-itens">❌ Nenhum item encontrado</div>';
        resultBox.classList.add('show');
        return;
    }
    
    // Mostrar resultados
    resultContent.innerHTML = '';
    itensFiltrados.forEach(item => {
        const div = document.createElement('div');
        div.className = 'spawn-result-item';
        div.innerHTML = `
            <div class="spawn-result-nome">${item.nome}</div>
            <div class="spawn-result-categoria">📁 ${getNomeCategoria(item.categoria)}</div>
            <div class="spawn-result-comando" onclick="copiarSpawnDireto('${item.spawn}')" title="Clique para copiar">
                ${item.spawn}
            </div>
            <button class="btn-copiar-spawn" onclick="copiarSpawnDireto('${item.spawn}')">📋 Copiar Spawn</button>
        `;
        resultContent.appendChild(div);
    });
    
    resultBox.classList.add('show');
}

function consultarPorCategoria() {
    const categoria = document.getElementById('selectConsultaCategoria').value;
    const resultBox = document.getElementById('spawnResultBox');
    const resultContent = document.getElementById('spawnResultContent');
    
    // Limpar campo de pesquisa ao selecionar categoria
    document.getElementById('inputConsultaSpawn').value = '';
    
    if (!categoria) {
        resultBox.classList.remove('show');
        return;
    }
    
    // Filtrar itens da categoria selecionada ou todos
    let itensFiltrados;
    if (categoria === 'todos') {
        itensFiltrados = todosItens;
    } else {
        itensFiltrados = todosItens.filter(item => item.categoria === categoria);
    }
    
    // Mostrar resultados
    resultContent.innerHTML = '';
    itensFiltrados.forEach(item => {
        const div = document.createElement('div');
        div.className = 'spawn-result-item';
        div.innerHTML = `
            <div class="spawn-result-nome">${item.nome}</div>
            <div class="spawn-result-categoria">📁 ${getNomeCategoria(item.categoria)}</div>
            <div class="spawn-result-comando" onclick="copiarSpawnDireto('${item.spawn}')" title="Clique para copiar">
                ${item.spawn}
            </div>
            <button class="btn-copiar-spawn" onclick="copiarSpawnDireto('${item.spawn}')">📋 Copiar Spawn</button>
        `;
        resultContent.appendChild(div);
    });
    
    resultBox.classList.add('show');
}

function copiarSpawnDireto(spawn) {
    navigator.clipboard.writeText(spawn).then(() => {
        // Copiado silenciosamente
    });
}

function getNomeCategoria(categoria) {
    const nomes = {
        'armas_brancas': 'Armas Brancas',
        'armas_policia': 'Polícia',
        'armas_bandidos': 'Bandidos',
        'armas_extras': 'Extras',
        'lojinha': 'Lojinha',
        'fabricacao': 'Fabricação',
        'drogas': 'Drogas',
        'diversos': 'Diversos',
        'municoes': 'Munições'
    };
    return nomes[categoria] || categoria;
}

// ============= FUNÇÕES ORIGINAIS DO FORMULÁRIO =============
function pesquisarItem() {
    const termo = document.getElementById('inputPesquisa').value.trim().toLowerCase();
    const selectItem = document.getElementById('selectItem');
    
    selectItem.innerHTML = '<option value="">-- Selecione um item --</option>';
    
    if (termo.length < 2) {
        // Se pesquisa vazia ou muito curta, mostrar itens da categoria selecionada
        const categoria = document.getElementById('selectCategoria').value;
        if (categoria) {
            carregarItens();
        }
        return;
    }
    
    // Limpar seleção de categoria ao pesquisar
    document.getElementById('selectCategoria').value = '';
    
    // Filtrar itens que contenham o termo de busca
    const itensFiltrados = todosItens.filter(item => 
        item.nome.toLowerCase().includes(termo)
    );
    
    if (itensFiltrados.length === 0) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = '-- Nenhum item encontrado --';
        selectItem.appendChild(option);
        return;
    }
    
    // Adicionar itens encontrados
    itensFiltrados.forEach(item => {
        const option = document.createElement('option');
        option.value = `${item.categoria}|${item.index}`;
        option.textContent = `${item.nome} (${getNomeCategoria(item.categoria)})`;
        selectItem.appendChild(option);
    });
}

function carregarItens() {
    const categoria = document.getElementById('selectCategoria').value;
    const selectItem = document.getElementById('selectItem');
    
    // Limpar campo de pesquisa ao selecionar categoria
    document.getElementById('inputPesquisa').value = '';
    
    selectItem.innerHTML = '<option value="">-- Selecione um item --</option>';
    
    if (categoria === 'todos') {
        // Carregar todos os itens de todas as categorias
        todosItens.forEach(item => {
            const option = document.createElement('option');
            option.value = `${item.categoria}|${item.index}`;
            option.textContent = `${item.nome} (${getNomeCategoria(item.categoria)})`;
            selectItem.appendChild(option);
        });
    } else if (categoria && categorias[categoria]) {
        categorias[categoria].forEach((item, index) => {
            const option = document.createElement('option');
            option.value = `${categoria}|${index}`;
            option.textContent = item.nome;
            selectItem.appendChild(option);
        });
    }
}

function adicionarItem() {
    const itemValue = document.getElementById('selectItem').value;
    const quantidade = parseInt(document.getElementById('inputQuantidade').value) || 1;
    
    if (!itemValue || itemValue === '') {
        alert('⚠️ Selecione um item!');
        return;
    }
    
    // Parse do valor (formato: "categoria|index")
    const [categoria, indexStr] = itemValue.split('|');
    const itemIndex = parseInt(indexStr);
    
    const item = categorias[categoria][itemIndex];
    
    itensAdicionados.push({
        nome: item.nome,
        spawn: item.spawn,
        quantidade: quantidade
    });
    
    atualizarListaItens();
    document.getElementById('inputQuantidade').value = 1;
    verificarBotaoGerar();
}

function removerItem(index) {
    itensAdicionados.splice(index, 1);
    atualizarListaItens();
    verificarBotaoGerar();
}

function atualizarListaItens() {
    const lista = document.getElementById('listaItens');
    const empty = document.getElementById('emptyItens');
    
    if (itensAdicionados.length === 0) {
        empty.style.display = 'block';
        lista.innerHTML = '';
        return;
    }
    
    empty.style.display = 'none';
    lista.innerHTML = '';
    
    itensAdicionados.forEach((item, index) => {
        const tag = document.createElement('div');
        tag.className = 'item-tag';
        tag.innerHTML = `
            <span class="item-tag-nome">${item.nome}</span>
            <span class="item-tag-qtd">x${item.quantidade}</span>
            <button class="item-tag-remove" onclick="removerItem(${index})">×</button>
        `;
        lista.appendChild(tag);
    });
}

function verificarBotaoGerar() {
    const playerId = document.getElementById('inputPlayerId').value.trim();
    const motivo = document.getElementById('inputMotivo').value.trim();
    const btn = document.getElementById('btnGerar');
    
    btn.disabled = !playerId || !motivo || itensAdicionados.length === 0;
}

function gerarSolicitacao() {
    const playerId = document.getElementById('inputPlayerId').value.trim();
    const motivo = document.getElementById('inputMotivo').value.trim();
    
    if (!playerId || !motivo || itensAdicionados.length === 0) return;
    
    let itensTexto = itensAdicionados.map(item => 
        `${item.quantidade} ${item.nome}`
    ).join(', ');
    
    const textoSolicitacao = `SOLICITAÇÃO DE DEVOLUÇÃO
ID: ${playerId}
Motivo: ${motivo}
Itens: ${itensTexto}
Provas:
<@&1362168080716927133>`;
    
    document.getElementById('solicitacaoTexto').textContent = textoSolicitacao;
    
    const comandosLista = document.getElementById('comandosLista');
    comandosLista.innerHTML = '';
    
    itensAdicionados.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'comando-item';
        div.textContent = `solicitar ${playerId} ${item.spawn} ${item.quantidade}`;
        div.onclick = () => copiarComando(index);
        div.title = 'Clique para copiar este comando';
        comandosLista.appendChild(div);
    });
    
    historico.unshift({
        playerId: playerId,
        motivo: motivo,
        itens: [...itensAdicionados],
        timestamp: new Date()
    });
    
    if (historico.length > 10) {
        historico = historico.slice(0, 10);
    }
    
    salvarHistorico();
    atualizarHistorico();
    
    document.getElementById('resultBox').classList.add('show');
    document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copiarSolicitacao() {
    const texto = document.getElementById('solicitacaoTexto').textContent;
    navigator.clipboard.writeText(texto).then(() => {
        // Copiado silenciosamente
    });
}

function copiarComando(index) {
    const playerId = document.getElementById('inputPlayerId').value.trim();
    const item = itensAdicionados[index];
    const comando = `solicitar ${playerId} ${item.spawn} ${item.quantidade}`;
    
    navigator.clipboard.writeText(comando).then(() => {
        // Copiado silenciosamente
    });
}

function copiarTodosComandos() {
    const playerId = document.getElementById('inputPlayerId').value.trim();
    const comandos = itensAdicionados.map(item => 
        `solicitar ${playerId} ${item.spawn} ${item.quantidade}`
    ).join(' ; ');
    
    navigator.clipboard.writeText(comandos).then(() => {
        // Copiado silenciosamente
    });
}

function novaSolicitacao() {
    document.getElementById('inputPlayerId').value = '';
    document.getElementById('inputMotivo').value = '';
    document.getElementById('selectCategoria').value = '';
    document.getElementById('selectItem').innerHTML = '<option value="">-- Selecione um item --</option>';
    document.getElementById('inputQuantidade').value = 1;
    itensAdicionados = [];
    atualizarListaItens();
    verificarBotaoGerar();
    document.getElementById('resultBox').classList.remove('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function editarSolicitacao() {
    document.getElementById('resultBox').classList.remove('show');
    document.querySelector('.form-box').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function formatarDataHora(data) {
    const dia = String(data.getDate()).padStart(2, '0');
    const mes = String(data.getMonth() + 1).padStart(2, '0');
    const ano = data.getFullYear();
    const hora = String(data.getHours()).padStart(2, '0');
    const minuto = String(data.getMinutes()).padStart(2, '0');
    
    return `${dia}/${mes}/${ano} às ${hora}:${minuto}`;
}

function carregarSolicitacao(index) {
    const item = historico[index];
    if (!item) return;
    
    document.getElementById('inputPlayerId').value = item.playerId;
    document.getElementById('inputMotivo').value = item.motivo;
    itensAdicionados = [...item.itens];
    atualizarListaItens();
    verificarBotaoGerar();
    
    // Trocar para a aba de solicitação
    trocarAba('solicitacao');
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function atualizarHistorico() {
    const lista = document.getElementById('historicoLista');
    
    if (historico.length === 0) {
        lista.innerHTML = '<div class="empty-itens">Nenhuma solicitação realizada ainda</div>';
        return;
    }
    
    lista.innerHTML = '';
    
    historico.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'historico-item';
        
        const itensHtml = item.itens.map(i => 
            `<span class="historico-item-tag">${i.nome} x${i.quantidade}</span>`
        ).join('');
        
        div.innerHTML = `
            <div class="historico-item-header">
                <span class="historico-item-id">ID: ${item.playerId}</span>
                <span class="historico-item-data">📅 ${formatarDataHora(item.timestamp)}</span>
            </div>
            <div class="historico-item-motivo">📝 Motivo:  ${item.motivo}</div>
            <div class="historico-item-itens">${itensHtml}</div>
            <button class="btn-carregar-historico" onclick="carregarSolicitacao(${index})">📂 Carregar Solicitação</button>
        `;
        
        lista.appendChild(div);
    });
}

function salvarHistorico() {
    try {
        localStorage.setItem('nexus_historico', JSON.stringify(historico));
    } catch (e) {
        console.error('Erro ao salvar histórico:', e);
    }
}

function carregarHistoricoStorage() {
    try {
        const dados = localStorage.getItem('nexus_historico');
        if (dados) {
            historico = JSON.parse(dados);
            historico = historico.map(item => ({
                ...item,
                timestamp: new Date(item.timestamp)
            }));
        }
    } catch (e) {
        console.error('Erro ao carregar histórico:', e);
        historico = [];
    }
}

function limparHistorico() {
    if (confirm('⚠️ Deseja realmente limpar todo o histórico?')) {
        historico = [];
        localStorage.removeItem('nexus_historico');
        atualizarHistorico();
    }
}

// Event listeners
document.getElementById('inputPlayerId').addEventListener('input', verificarBotaoGerar);
document.getElementById('inputMotivo').addEventListener('input', verificarBotaoGerar);

// Inicialização
window.onload = function() {
    criarListaTodosItens();
    carregarHistoricoStorage();
    atualizarHistorico();
    
    // Adicionar evento de pesquisa
    document.getElementById('inputPesquisa').addEventListener('input', pesquisarItem);
};
